apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-blog-frontend-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/plus-jia/gitops-blog-manifests.git
    targetRevision: main
    path: apps/blog/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: blog-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
