apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-blog-frontend
  labels:
    app.kubernetes.io/name: gitops-blog-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitops-blog-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitops-blog-frontend
    spec:
      containers:
        - name: blog
          image: ghcr.io/plus-jia/gitops-blog-frontend:latest
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
