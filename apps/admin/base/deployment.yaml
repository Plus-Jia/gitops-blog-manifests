apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-blog-admin
  labels:
    app.kubernetes.io/name: gitops-blog-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitops-blog-admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitops-blog-admin
    spec:
      containers:
        - name: admin
          image: ghcr.io/plus-jia/gitops-blog-admin:latest
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - secretRef:
                name: gitops-blog-admin-github
                optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
