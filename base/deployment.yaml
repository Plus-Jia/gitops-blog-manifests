apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-blog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-blog
  template:
    metadata:
      labels:
        app: gitops-blog
    spec:
      containers:
        - name: gitops-blog
          image: ghcr.io/plus-jia/gitops-blog:PLACEHOLDER
          ports:
            - containerPort: 80